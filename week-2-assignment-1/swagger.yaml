openapi: 3.0.4
info:
  title: Task Management API
  version: 1.0.0
  description: A simple API for managing tasks

servers:
- url: http://localhost:3000
  description: Local server

tags:
- name: Tasks
description: Operations related to tasks

paths:
    /tasks:
        get:
            summary: Get all tasks
            tags: 
                - Tasks
            description: Retrieve a list of all tasks
            responses:
                "200":
                    description: A list of tasks
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        id:
                                            type: integer
                                            example: 1
                                        title:
                                            type: string
                                            example: "Sample Task"
                                        done:
                                            type: boolean
                                            example: false
        post:
            summary: Create a new task
            tags: 
                - Tasks
            description: Add a new task to the list
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                title:
                                    type: string
                                    example: "New Task"
            responses:
                "201":
                    description: Task created successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: integer
                                        example: 2
                                    title:
                                        type: string
                                        example: "New Task"
                                    done:
                                        type: boolean
                                        example: false
                "400":
                    description: Invalid input, task not created
    /tasks/{id}:
        get:
            summary: Get a task by ID
            tags: 
                - Tasks
            description: Retrieve a specific task by its ID
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
                  description: The ID of the task to retrieve
            responses:
                "200":
                    description: Task found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: integer
                                        example: 1
                                    title:
                                        type: string
                                        example: "Sample Task"
                                    done:
                                        type: boolean
                                        example: false
                "404":
                    description: Task not found
        put:
            description: Update a task by ID
            summary: Update a specific task by its ID
            tags:
                - Tasks
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
                  description: The ID of the task to update
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                title:
                                    type: string
                                    example: "Updated Task"
                                done:
                                    type: boolean
                                    example: true
            responses:
                "200":
                    description: Task updated successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: integer
                                        example: 1
                                    title:
                                        type: string
                                        example: "Updated Task"
                                    done:
                                        type: boolean
                                        example: true
                "404":
                    description: Task not found
        delete:
            summary: Delete a task by ID
            description: Remove a specific task by its ID
            tags:
                - Tasks
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: integer
                  description: The ID of the task to delete
            responses:
                "204":
                    description: Task deleted successfully
                "404":
                    description: Task not found